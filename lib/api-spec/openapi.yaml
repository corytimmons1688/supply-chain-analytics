          properties:
            rolls:
              type: array
              items: { $ref: "#/components/schemas/SnapshotRoll" }
    DemandStockMetrics:
      type: object
      required:
        - stockId
        - onHandFootage
        - onHandRollCount
        - totalDemandFootage
        - weeksOfHistory
        - avgWeeklyDemand
        - weeklyDemandStdDev
        - demandCv
        - autoDemandCv
        - demandCvOverridden
        - avgLeadTimeDays
        - autoLeadTimeDays
        - leadTimeDaysOverridden
        - leadTimeStdDev
        - leadTimeCv
        - autoLeadTimeCv
        - leadTimeCvOverridden
        - seasonalityWeights
        - defaultSeasonalityWeights
        - seasonalityWeightsOverridden
        - poObservations
        - typicalRollFootage
        - autoTypicalRollFootage
        - typicalRollFootageOverridden
        - safetyStockFootage
        - reorderPointFootage
        - maxFootage
        - suggestedOrderFootage
        - suggestedOrderRolls
        - belowMin
        - daysOfCover
        - forecast12wkFootage
        - openPoCount
        - openPoRolls
        - openPoFootage
        - activityStatus
        - customized
      properties:
        stockId: { type: string }
        description: { type: string, nullable: true }
        onHandFootage: { type: number }
        onHandRollCount: { type: integer }
        totalDemandFootage: { type: number }
        weeksOfHistory: { type: integer }
        avgWeeklyDemand: { type: number }
        weeklyDemandStdDev: { type: number }
        demandCv: { type: number, description: "Effective demand CV used in safety-stock math (override if set, else auto-derived)." }
        autoDemandCv: { type: number, description: "Auto-derived demand CV from history (stdev / mean of weekly demand)." }
        demandCvOverridden: { type: boolean, description: "True when demandCv comes from a per-stock override rather than the auto-derived value." }
        avgLeadTimeDays: { type: number, description: "Effective average lead time in days (override if set, else auto-derived from PO history)." }
        autoLeadTimeDays: { type: number, description: "Auto-derived average lead time in days from observed PO history." }
        leadTimeDaysOverridden: { type: boolean, description: "True when avgLeadTimeDays comes from a per-stock override rather than the auto-derived value." }
        leadTimeStdDev: { type: number }
        leadTimeCv: { type: number, description: "Effective lead-time CV used in safety-stock math (override if set, else auto-derived)." }
        autoLeadTimeCv: { type: number, description: "Auto-derived lead-time CV from observed PO lead times." }
        leadTimeCvOverridden: { type: boolean, description: "True when leadTimeCv comes from a per-stock override rather than the auto-derived value." }
        seasonalityWeights:
          type: array
          minItems: 3
          maxItems: 3
          items: { type: number }
          description: "Effective seasonality weights for months 1, 2, 3 of each quarter (sum to 1)."
        defaultSeasonalityWeights:
          type: array
          minItems: 3
          maxItems: 3
          items: { type: number }
          description: "Default seasonality weights used when no override is set."
        seasonalityWeightsOverridden: { type: boolean, description: "True when seasonalityWeights come from a per-stock override rather than the default." }
        poObservations: { type: integer }
        typicalRollFootage: { type: number, description: "Effective typical incoming roll size (override if set, else auto-derived)." }
        autoTypicalRollFootage: { type: number, description: "Auto-derived typical incoming roll size from observed PO history." }
        typicalRollFootageOverridden: { type: boolean, description: "True when typicalRollFootage comes from a per-stock override rather than the auto-derived value." }
        safetyStockFootage: { type: number }
        reorderPointFootage: { type: number }
        maxFootage: { type: number }
        suggestedOrderFootage: { type: number }
        suggestedOrderRolls: { type: integer }
        belowMin: { type: boolean }
        daysOfCover: { type: integer }
        forecast12wkFootage: { type: number }
        openPoCount: { type: integer, description: "Number of open (unreceived, non-cancelled) Stock-type purchase orders for this stock." }
        openPoRolls: { type: integer, description: "Sum of master-roll quantities across open POs." }
        openPoFootage: { type: number, description: "Estimated footage on order = openPoRolls * typicalRollFootage." }
        lastUsedDate: { type: string, format: date, nullable: true }
        daysSinceLastUse: { type: integer, nullable: true }
        activityStatus:
          type: string
          enum: [active, slowing, dormant, never]
          description: |
            Roll-up of recent demand activity:
            - active: used within the last 60 days
            - slowing: last used 60-180 days ago (review)
            - dormant: last used >180 days ago (consider inactivating)
            - never: no demand observed in window
        customized: { type: boolean, description: True if any per-stock forecast assumption override is set. }
    DemandSummary:
      type: object
      required: [windowFrom, windowTo, monthsBack, serviceLevel, forecastWeeks, generatedAt, items]
      properties:
        windowFrom: { type: string, format: date }
        windowTo: { type: string, format: date }
