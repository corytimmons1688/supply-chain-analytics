openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Inventory adjustments dashboard API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: adjustments
  - name: goals
  - name: snapshots
  - name: vendors
  - name: asl
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /gateway/health:
    get:
      operationId: gatewayHealth
      tags: [health]
      summary: Label Traxx ODBC gateway connectivity
      responses:
        "200":
          description: Status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GatewayHealth"
  /adjustments/timeseries:
    get:
      operationId: getAdjustmentsTimeseries
      tags: [adjustments]
      summary: Bucketed inventory adjustment dollars over time
      parameters:
        - $ref: "#/components/parameters/Bucket"
        - $ref: "#/components/parameters/From"
        - $ref: "#/components/parameters/To"
        - $ref: "#/components/parameters/StockId"
      responses:
        "200":
          description: Time series
          content:
            application/json:
              schema:
                type: object
                required: [bucket, from, to, points]
                properties:
                  bucket: { $ref: "#/components/schemas/BucketSize" }
                  from: { type: string, format: date }
                  to: { type: string, format: date }
                  points:
                    type: array
                    items: { $ref: "#/components/schemas/TimeseriesPoint" }
  /adjustments/totals:
    get:
      operationId: getAdjustmentsTotals
      tags: [adjustments]
      summary: Total added, removed, and net for a window
      parameters:
        - $ref: "#/components/parameters/From"
        - $ref: "#/components/parameters/To"
        - $ref: "#/components/parameters/StockId"
      responses:
        "200":
          description: Totals
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AdjustmentTotals" }
  /adjustments/by-stock:
    get:
      operationId: getAdjustmentsByStock
      tags: [adjustments]
      summary: Adjustments aggregated per Stock ID for a window
      parameters:
        - $ref: "#/components/parameters/From"
        - $ref: "#/components/parameters/To"
      responses:
        "200":
          description: Per-stock breakdown
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/StockBreakdownItem" }
  /adjustments/details:
    get:
      operationId: getAdjustmentsDetails
      tags: [adjustments]
      summary: Line-item adjustment rows
      parameters:
        - $ref: "#/components/parameters/From"
        - $ref: "#/components/parameters/To"
        - $ref: "#/components/parameters/StockId"
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 1000, default: 200 }
      responses:
        "200":
          description: Detail rows
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/AdjustmentRow" }
  /adjustments/root-cause:
    get:
      operationId: getAdjustmentsRootCause
      tags: [adjustments]
      summary: Per-stock variance with root-cause investigation tracking
      parameters:
        - $ref: "#/components/parameters/From"
        - $ref: "#/components/parameters/To"
      responses:
        "200":
          description: Per-stock variance + investigation
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/RootCauseItem" }
  /adjustments/root-cause/{stockId}:
    put:
      operationId: setVarianceInvestigation
      tags: [adjustments]
      summary: Upsert root-cause investigation for a stock
      parameters:
        - name: stockId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/VarianceInvestigationInput" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VarianceInvestigation" }
  /inventory/on-hand:
    get:
      operationId: getOnHandInventory
      tags: [adjustments]
      summary: Total dollar value and roll count of rolls currently in stock (DateRollUsed is blank)
      responses:
        "200":
          description: On-hand totals
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OnHandInventory" }
  /goals:
    get:
      operationId: getGoals
      tags: [goals]
      summary: Get global and per-stock goal bands
      responses:
        "200":
          description: Goals
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GoalsResponse" }
  /goals/global:
    put:
      operationId: setGlobalGoal
      tags: [goals]
      summary: Set global min/max goal band
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GoalBandInput" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GoalBand" }
  /goals/stock/{stockId}:
    put:
      operationId: setStockGoal
      tags: [goals]
      parameters:
        - name: stockId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GoalBandInput" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StockGoal" }
    delete:
      operationId: deleteStockGoal
      tags: [goals]
      parameters:
        - name: stockId
          in: path
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Removed
  /snapshots:
    get:
      operationId: listWeeklySnapshots
      tags: [snapshots]
      summary: List weekly snapshots (most recent first)
      responses:
        "200":
          description: Snapshots
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/SnapshotSummary" }
    post:
      operationId: captureWeeklySnapshot
      tags: [snapshots]
      summary: Manually capture a weekly snapshot for the current Mountain Time week
      responses:
        "200":
          description: Captured
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WeeklySnapshot" }
  /snapshots/{weekEnding}:
    get:
      operationId: getWeeklySnapshot
      tags: [snapshots]
      summary: Get a single snapshot with roll details
      parameters:
        - name: weekEnding
          in: path
          required: true
          schema: { type: string, format: date }
      responses:
        "200":
          description: Snapshot detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WeeklySnapshot" }
  /monthly-snapshots:
    get:
      operationId: listMonthlySnapshots
      tags: [snapshots]
      summary: List monthly snapshots (most recent first)
      responses:
        "200":
          description: Monthly snapshots
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/MonthlySnapshotSummary" }
    post:
      operationId: captureMonthlySnapshot
      tags: [snapshots]
      summary: Manually capture a monthly snapshot for the current Mountain Time month
      responses:
        "200":
          description: Captured
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MonthlySnapshot" }
  /monthly-snapshots/{monthKey}:
    get:
      operationId: getMonthlySnapshot
      tags: [snapshots]
      summary: Get a single monthly snapshot with roll details
      parameters:
        - name: monthKey
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Monthly snapshot detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MonthlySnapshot" }
  /demand/summary:
    get:
      operationId: getDemandSummary
      tags: [demand]
      summary: Per-stock demand history, on-hand, lead time, and recommended min/max
      parameters:
        - name: monthsBack
          in: query
          schema: { type: integer, default: 6 }
        - name: serviceLevel
          in: query
          schema: { type: number, default: 0.95 }
        - name: demandCv
          in: query
          schema: { type: number }
        - name: leadTimeCv
          in: query
          schema: { type: number }
        - name: forecastWeeks
          in: query
          schema: { type: integer, default: 12 }
      responses:
        "200":
          description: Demand summary
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DemandSummary" }
  /demand/stock-detail:
    get:
      operationId: getDemandStockDetail
      tags: [demand]
      summary: Demand history + 12-week forecast for a single stock
      parameters:
        - name: stockId
          in: query
          required: true
          schema: { type: string }
        - name: monthsBack
          in: query
          schema: { type: integer, default: 6 }
        - name: bucket
          in: query
          schema: { $ref: "#/components/schemas/BucketSize" }
        - name: serviceLevel
          in: query
          schema: { type: number, default: 0.95 }
        - name: demandCv
          in: query
          schema: { type: number }
        - name: leadTimeCv
          in: query
          schema: { type: number }
        - name: forecastWeeks
          in: query
          schema: { type: integer, default: 12 }
      responses:
        "200":
          description: Stock demand detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DemandStockDetail" }
  /cycle-counts/schedule:
    get:
      operationId: getCycleCountSchedule
      tags: [cycle-counts]
      summary: Active financial-quarter cycle-count schedule with per-week tasks and KPI
      responses:
        "200":
          description: Schedule
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CycleCountScheduleResponse" }
  /cycle-counts/kpi:
    get:
      operationId: getCycleCountKpi
      tags: [cycle-counts]
      summary: On-track / behind status for the active cycle-count quarter
      responses:
        "200":
          description: KPI
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CycleCountKpi" }
  /cycle-counts/regenerate:
    post:
      operationId: regenerateCycleCountSchedule
      tags: [cycle-counts]
      summary: Force-regenerate the schedule snapshot from current ABC classifications
      responses:
        "200":
          description: Regenerated
          content:
            application/json:
              schema:
                type: object
                required: [quarter, generatedAt]
                properties:
                  quarter: { type: string }
                  generatedAt: { type: string, format: date-time }
  /cycle-counts/complete:
    post:
      operationId: markCycleCountComplete
      tags: [cycle-counts]
      summary: Mark a stock as counted in a given week
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CycleCountCompleteInput" }
      responses:
        "200":
          description: Marked complete
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CycleCountCompletion" }
    delete:
      operationId: unmarkCycleCountComplete
      tags: [cycle-counts]
      summary: Remove the completion record for a stock + week
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CycleCountCompleteInput" }
      responses:
        "204":
          description: Removed
  /vendors:
    get:
      operationId: listVendors
      tags: [vendors]
      summary: List all vendors
      responses:
        "200":
          description: Vendors
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Vendor" }
    post:
      operationId: createVendor
      tags: [vendors]
      summary: Create a vendor
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/VendorInput" }
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Vendor" }
  /vendors/{vendorId}:
    put:
      operationId: updateVendor
      tags: [vendors]
      parameters:
        - name: vendorId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/VendorInput" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Vendor" }
    delete:
      operationId: deleteVendor
      tags: [vendors]
      parameters:
        - name: vendorId
          in: path
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Removed
  /vendors/seed:
    post:
      operationId: seedVendors
      tags: [vendors]
      summary: Pre-load vendors and ASL entries from the Flex Sourcing tracker (idempotent)
      responses:
        "200":
          description: Seeded
          content:
            application/json:
              schema:
                type: object
                required: [created, updated, skipped]
                properties:
                  created: { type: integer }
                  updated: { type: integer }
                  skipped: { type: integer }
  /vendors/seed-asl:
    post:
      operationId: seedCurrentAsl
      tags: [vendors]
      summary: Load the detailed current Approved Supplier List (active suppliers, idempotent)
      responses:
        "200":
          description: Seeded
          content:
            application/json:
              schema:
                type: object
                required: [created, updated]
                properties:
                  created: { type: integer }
                  updated: { type: integer }
  /vendors/aliases:
    post:
      operationId: createVendorAlias
      tags: [vendors]
      summary: Map an unmatched source name to an existing vendor (persists for future syncs)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/VendorAliasInput" }
      responses:
        "200":
          description: Alias saved
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VendorAlias" }
        "400":
          description: Invalid input
        "404":
          description: Vendor not found
    get:
      operationId: listVendorAliases
      tags: [vendors]
      summary: List all saved vendor-name aliases (raw name -> mapped vendor)
      responses:
        "200":
          description: Saved aliases
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/VendorAliasEntry" }
  /vendors/aliases/{id}:
    put:
      operationId: updateVendorAlias
      tags: [vendors]
      summary: Re-point an existing alias to a different vendor
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/VendorAliasUpdate" }
      responses:
        "200":
          description: Alias updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VendorAlias" }
        "400":
          description: Invalid input
        "404":
          description: Alias or vendor not found
    delete:
      operationId: deleteVendorAlias
      tags: [vendors]
      summary: Delete a saved alias
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted
  /vendors/scorecards:
    get:
      operationId: getVendorScorecards
      tags: [vendors]
      summary: Per-vendor scorecard KPIs aggregated over a time view
      parameters:
        - name: view
          in: query
          required: false
          schema: { $ref: "#/components/schemas/ScorecardView" }
        - name: anchor
          in: query
          required: false
          description: Anchor date (YYYY-MM-DD) the view is computed relative to; defaults to today
          schema: { type: string, format: date }
      responses:
        "200":
          description: Scorecards
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ScorecardResponse" }
  /vendors/netsuite/sync:
    post:
      operationId: syncNetsuiteShipments
      tags: [vendors]
      summary: Read-only sync of NetSuite purchase shipments into vendor on-time data
      responses:
        "200":
          description: Synced
          content:
            application/json:
              schema: { $ref: "#/components/schemas/NetsuiteSyncResult" }
        "400":
          description: NetSuite not configured
  /vendors/netsuite/quality-sync:
    post:
      operationId: syncNetsuiteQualityCases
      tags: [vendors]
      summary: Read-only sync of NetSuite support cases attributed to vendors as quality cases
      responses:
        "200":
          description: Synced
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QualityCaseSyncResult" }
        "400":
          description: NetSuite not configured
  /vendors/quality-cases:
    get:
      operationId: listQualityCases
      tags: [vendors]
      summary: NetSuite-sourced quality cases attributed to vendors (read-only)
      parameters:
        - { name: vendorId, in: query, required: false, schema: { type: string } }
      responses:
        "200":
          description: Quality cases
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/QualityCase" }
  /vendors/shipments:
    get:
      operationId: listVendorShipments
      tags: [vendors]
      summary: All purchase orders / shipments for a vendor with on-time and lead-time details
      parameters:
        - { name: vendorId, in: query, required: false, schema: { type: string } }
      responses:
        "200":
          description: Vendor shipments
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/VendorShipment" }
  /vendors/labeltraxx/sync:
    post:
      operationId: syncLabeltraxxLeadTimes
      tags: [vendors]
      summary: Read-only sync of Label Traxx PO lead times (PODate to Received) attributed per vendor
      parameters:
        - name: since
          in: query
          required: false
          description: Earliest Received date to include (YYYY-MM-DD); defaults to ~2 years back
          schema: { type: string, format: date }
      responses:
        "200":
          description: Synced
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LeadTimeSyncResult" }
  /vendors/lead-times:
    get:
      operationId: getVendorLeadTimes
      tags: [vendors]
      summary: Label Traxx purchase orders (lead time + roll fill) for a single vendor
      parameters:
        - name: vendorId
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Lead time PO list
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LeadTimeResponse" }
  /vendors/trend:
    get:
      operationId: getVendorTrend
      tags: [vendors]
      summary: Monthly KPI time series for a single vendor
      parameters:
        - name: vendorId
          in: query
          required: true
          schema: { type: string }
        - name: months
          in: query
          required: false
          description: Number of trailing months (1-36, default 12)
          schema: { type: integer }
        - name: anchor
          in: query
          required: false
          description: Anchor date (YYYY-MM-DD); series ends at this month, defaults to today
          schema: { type: string, format: date }
      responses:
        "200":
          description: Trend series
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VendorTrendResponse" }
  /vendors/metrics:
    put:
      operationId: upsertVendorMetric
      tags: [vendors]
      summary: Create or update a vendor's manual metrics for a period (YYYY-MM)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/VendorMetricInput" }
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VendorMetric" }
  /vendors/quality-issues:
    get:
      operationId: listQualityIssues
      tags: [vendors]
      parameters:
        - { name: vendorId, in: query, required: false, schema: { type: string } }
      responses:
        "200":
          description: Quality issues
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/QualityIssue" }
    post:
      operationId: createQualityIssue
      tags: [vendors]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/QualityIssueInput" }
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QualityIssue" }
  /vendors/quality-issues/{id}:
    put:
      operationId: updateQualityIssue
      tags: [vendors]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/QualityIssueInput" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/QualityIssue" }
    delete:
      operationId: deleteQualityIssue
      tags: [vendors]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "204":
          description: Removed
  /vendors/pricing-reviews:
    get:
      operationId: listPricingReviews
      tags: [vendors]
      parameters:
        - { name: vendorId, in: query, required: false, schema: { type: string } }
      responses:
        "200":
          description: Pricing reviews
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/PricingReview" }
    post:
      operationId: createPricingReview
      tags: [vendors]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PricingReviewInput" }
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PricingReview" }
  /vendors/pricing-reviews/{id}:
    put:
      operationId: updatePricingReview
      tags: [vendors]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PricingReviewInput" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PricingReview" }
    delete:
      operationId: deletePricingReview
      tags: [vendors]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "204":
          description: Removed
  /vendors/improvement-projects:
    get:
      operationId: listImprovementProjects
      tags: [vendors]
      parameters:
        - { name: vendorId, in: query, required: false, schema: { type: string } }
      responses:
        "200":
          description: Improvement projects
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/ImprovementProject" }
    post:
      operationId: createImprovementProject
      tags: [vendors]
      requestBody:
        required: true
        content:
          application/json:
