        pctOfOnHand:
          type: number
          nullable: true
          description: Net adjustment as a percentage of current on-hand value. Null when on-hand value is zero.
    AdjustmentRow:
      type: object
      required: [id, rollTag, stockId, direction, amount, ccDate, ccString]
      properties:
        id: { type: string }
        rollTag: { type: string }
        stockId: { type: string }
        description: { type: string, nullable: true }
        direction:
          type: string
          enum: [added, removed]
        amount: { type: number }
        ccDate: { type: string, format: date }
        ccString: { type: string }
        poNumber: { type: string, nullable: true }
        usedTikNum: { type: string, nullable: true }
        rowDate: { type: string, format: date, nullable: true }
    OnHandInventory:
      type: object
      required: [totalValue, rollCount]
      properties:
        totalValue: { type: number }
        rollCount: { type: integer }
    GoalBand:
      type: object
      required: [min, max]
      properties:
        min: { type: number, nullable: true }
        max: { type: number, nullable: true }
        serviceLevel:
          type: number
          nullable: true
          description: Shared Demand Planning service-level default (0–1). Null = app default 0.95.
        monthsBack:
          type: integer
          nullable: true
          description: Shared Demand Planning history-window default in months. Null = app default 6.
        demandCv:
          type: number
          nullable: true
          description: Shared Demand Planning demand-CV override default. Null = no override.
        leadTimeCv:
          type: number
          nullable: true
          description: Shared Demand Planning lead-time-CV override default. Null = no override.
    GoalBandInput:
      type: object
      properties:
        min: { type: number, nullable: true }
        max: { type: number, nullable: true }
        demandCv: { type: number, nullable: true }
        leadTimeCv: { type: number, nullable: true }
        serviceLevel: { type: number, nullable: true }
        monthsBack: { type: integer, nullable: true }
        seasonalityWeights:
          type: array
          nullable: true
          minItems: 3
          maxItems: 3
          items: { type: number }
          description: Quarterly seasonality weights for months 1, 2, 3 of each quarter. Should sum to ~1.0.
        leadTimeDays:
          type: number
          nullable: true
          description: Manual override for the average supplier lead time in days. Null = use observed PO history.
        typicalRollFootage:
          type: number
          nullable: true
          description: Manual override for the typical incoming roll size (footage). Null = use observed roll history.
    StockGoal:
      type: object
