    CycleCountCompleteInput:
      type: object
      required: [stockId, quarter, week]
      properties:
        stockId: { type: string }
        quarter: { type: string }
        week: { type: integer }
        completedAt: { type: string, format: date-time, nullable: true }
    CycleCountCompletion:
      type: object
      required: [stockId, quarter, week, completedAt]
      properties:
        stockId: { type: string }
        quarter: { type: string }
        week: { type: integer }
        completedAt: { type: string, format: date-time }
